# =========================
# 全局设置
# =========================
seed: 42                  # 随机种子，保证每次运行代码划分的数据和初始化的权重一样，方便复现实验结果
device: gpu               # 训练设备: cpu / gpu

# =========================
# 数据配置
# =========================
data:
  path: data/processed/phase_data.npz   # npz数据路径（由plt转换而来）

  # 是否归一化（强烈建议开启）PINN对输入数据的尺度极其敏感，归一化能防止梯度爆炸或消失
  normalize: true

  # 归一化方式: minmax / standard
  norm_type: minmax    #使用最小-最大归一化，将坐标和时间缩放到 [0, 1] 之间

  # 训练使用的数据量（从全部数据中随机采样）每一轮训练实际使用的采样点数量
  num_samples: 50000

  # 是否打乱数据,打破数据的空间和时间相关性，有助于优化器更好收敛
  shuffle: true

  # 是否加入噪声（用于鲁棒性实验）（用于测试模型在真实带噪环境下的抗干扰/鲁棒性）
  add_noise: false

  # 噪声强度（标准差比例）若开启加噪，噪声的标准差比例设定为 1%
  noise_level: 0.01


# =========================
# 模型结构（PINN网络）
# =========================
model:
  input_dim: 3           # 输入维度 (x, y, t)
  output_dim: 2          # 输出维度 (p, c)

  hidden_dim: 128        # 隐藏层宽度,每层神经元数
  num_layers: 6          # 隐藏层层数

  activation: tanh       # 激活函数: tanh / relu / gelu

  fourier_scale: 30.0
  #傅里叶特征映射的缩放因子
  # 推荐范围: 10.0 ~ 50.0。
  # 枝晶界面越薄，这个值通常需要越大

  # 是否使用残差连接（提高稳定性）
  use_residual: false


# =========================
# 物理模型（对应你的C代码）
# =========================
physics:

  # 是否启用相场方程
  use_phase_field: true

  # 是否启用成分扩散方程
  use_concentration: true

  # 网格步长（必须和C代码一致）
  deltx: 2.41e-6
  delty: 2.41e-6
  delt: 1.1e-8

  # 常数（如果不反演则固定）
  R: 8.31451

  # 扩散系数（初值）
  Ds: 1.08e-8
  Dl: 1.0e-5

  # 界面参数
  gamma: 0.055

  # 是否使用各向异性（你的cos(4θ)项）
  use_anisotropy: true


# =========================
# 参数反演（核心模块）
# =========================
inverse:

  # 是否开启参数反演
  enable: true

  # ---------- γ（各向异性） ----------
  learn_gamma: true        # 是否学习gamma
  gamma_init: 0.01         # 初始值（不要设太大）

  # ---------- 扩散系数 ----------
  learn_Ds: false     #是否反演固相扩散系数 Ds
  Ds_init: 1.0e-7      #初始值

  learn_Dl: false   #是否反演液相扩散系数 Dl
  Dl_init: 1.0e-5     #初始值

  # 限制参数范围（防止发散）
  clamp: true
  # gamma 的物理上下限
  gamma_min: 0.0
  gamma_max: 1.0

  # Ds 的物理上下限 (下限防崩溃，上限防飞天)
  Ds_min: 1.0e-12
  Ds_max: 1.0e-5

  #Dl 的物理上下限
  Dl_min: 1.0e-12
  Dl_max: 1.0e-3



# =========================
# 训练、优化配置配置
# =========================
train:

  batch_size: 4096         # 每批数据量（PINN通常较大）
  lr: 1e-3                 # 学习率

  max_epochs: 1000        # 最大训练轮数

  # 优化器: adam / lbfgs
  optimizer: adam

  # 学习率衰减
  lr_scheduler: true
  step_size: 5000      # 每隔 5000 步进行一次衰减
  gamma: 0.5             # 每次衰减为当前学习率的一半



# =========================
# 损失函数权重（非常关键）
# =========================
loss:

  # 数据拟合项
  lambda_data: 10.0

  # PDE残差项（核心）
  lambda_pde: 1.0

  # 边界条件
  lambda_bc: 1.0

  # 初始条件
  lambda_ic: 1.0


# =========================
# 采样策略（PINN核心）
# =========================
sampling:

  # PDE采样点数量
  num_collocation: 50000

  # 是否均匀采样
  uniform: true

  # 是否重点采样界面区域（推荐后期加）

  focus_interface: true      # 开启界面追踪总开关
  start_focus_epoch: 50      # 前 50 轮不追踪，50 轮后开始精准打击

# =========================
# 日志与输出
# =========================
logging:

  log_interval: 10       # 每多少步记录一次

  # 是否保存模型
  save_model: true

  # 保存路径
  save_dir: experiments/

  # 是否记录gamma变化（反演很重要）
  track_parameters: true


# =========================
# 调试模式（建议前期开启）
# =========================
debug:

  # 是否使用小数据快速测试
  small_run: true

  # 使用数据量（调试用）
  debug_samples: 2000

  # 是否打印详细信息
  verbose: true